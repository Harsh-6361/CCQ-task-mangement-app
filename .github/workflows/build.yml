name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          BUILD_NUMBER=$(echo $VERSION | cut -d'+' -f2)
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Get APK info
        id: apk-info
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          APK_SIZE=$(ls -lh $APK_PATH | awk '{print $5}')
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "Download size: $APK_SIZE"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## APK Release v${{ steps.version.outputs.version }}

            **Download:** app-release.apk (${{ steps.apk-info.outputs.apk_size }})

            ### Changes
            Built automatically from commit ${{ github.sha }}

            ### Installation
            Download the APK and install on your Android device.
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create update.json
        if: github.event_name == 'push'
        run: |
          cat > update.json << EOF
          {
            "versionCode": ${{ steps.version.outputs.build_number }},
            "versionName": "${{ steps.version.outputs.version }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/app-release.apk",
            "notes": "Auto-build release v${{ steps.version.outputs.version }}"
          }
          EOF
          echo "Created update.json"

      - name: Upload update.json to release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}